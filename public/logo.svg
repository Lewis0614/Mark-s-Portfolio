<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark luxurious charcoal/gold metallic background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C07" />
      <stop offset="40%" stop-color="#080604" />
      <stop offset="100%" stop-color="#020100" />
    </linearGradient>
    
    <!-- Premium Gold gradient for strokes representing premium technical bronze-gold -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBB3" />
      <stop offset="50%" stop-color="#FFBA20" />
      <stop offset="100%" stop-color="#B28014" />
    </linearGradient>

    <!-- Subtle Amber Glow Background -->
    <radialGradient id="ambient-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffba20" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffba20" stop-opacity="0" />
    </radialGradient>

    <!-- Drop Shadow / Glow filter for master brand presentation -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid premium branding background: Rounded Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg-grad)" stroke="#ffba20" stroke-width="2" stroke-opacity="0.2" />
  
  <!-- Subtle inner blueprint lines indicating high-end design craftsmanship -->
  <rect x="32" y="32" width="448" height="448" rx="88" fill="none" stroke="#ffba20" stroke-width="1" stroke-opacity="0.08" stroke-dasharray="4 6" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffba20" stroke-width="1" stroke-opacity="0.05" />

  <!-- Ambient background glow behind monologue -->
  <circle cx="256" cy="256" r="140" fill="url(#ambient-glow)" />

  <!-- "JM" Monogram Code -->
  <g filter="url(#glow)">
    <!-- Main single-stroke cohesive vector shape joining J and M -->
    <path 
      d="M 141,280 L 141,300 C 141,355 191,355 191,300 L 191,160 L 281,270 L 371,160 L 371,350" 
      fill="none" 
      stroke="url(#gold-grad)" 
      stroke-width="34" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
  </g>
</svg>
